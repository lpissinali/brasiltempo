# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
  concurrency: 80

# Public environment variables (safe to expose to the browser must be NEXT_PUBLIC_*).
# Secrets (e.g. ANTHROPIC_API_KEY later) should be wired via Cloud Secret Manager:
#   firebase apphosting:secrets:set ANTHROPIC_API_KEY
# then referenced here with `secret:` instead of `value:`.
env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: "https://brasiltempo.com.br"
    availability:
      - BUILD
      - RUNTIME

  # Google Analytics 4 Measurement ID. NEXT_PUBLIC_* is inlined at build time,
  # so BUILD availability is required for the tag to render in production.
  - variable: NEXT_PUBLIC_GA_ID
    value: "G-JXFL7E2XRS"
    availability:
      - BUILD
      - RUNTIME

  # Haiku model for Zé's phrases (public, not a secret). Optional — the code
  # defaults to this same value if unset.
  - variable: ANTHROPIC_MODEL
    value: "claude-haiku-4-5-20251001"
    availability:
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
  # --- Secrets (uncomment AFTER creating them in Secret Manager) ---
  # Create first, then deploy, or the rollout fails on a missing secret:
  #   firebase apphosting:secrets:set ANTHROPIC_API_KEY
  #   firebase apphosting:secrets:set CRON_SECRET
  #
  # - variable: ANTHROPIC_API_KEY
  #   secret: ANTHROPIC_API_KEY
  #   availability:
  #     - RUNTIME
  # - variable: CRON_SECRET
  #   secret: CRON_SECRET
  #   availability:
  #     - RUNTIME
